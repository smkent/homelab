networks:
  web:
    external: true

secrets:
  fastmail-backup-key:
    file: ../../secrets/fastmail-backup-key
  fastmail-backup-user:
    file: ../../secrets/fastmail-backup-user
  github-backup-token:
    file: ../../secrets/github-backup-token
  healthchecks-ping-key:
    file: ../../secrets/healthchecks-ping-key
  linode-backup-dns-token:
    file: ../../secrets/linode-backup-dns-token

services:
  extsync:
    image: ghcr.io/smkent/homelab/hc-task-runner:latest
    # build: ../../images/hc-task-runner
    env_file:
    - host.env
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.sync.schedule: "@every 6h"
      ofelia.job-exec.sync.command: /entrypoint /scripts/sync
      ofelia.job-exec.sync.user: "1000:1000"
    restart: unless-stopped
    secrets:
    - fastmail-backup-key
    - fastmail-backup-user
    - github-backup-token
    - healthchecks-ping-key
    - linode-backup-dns-token
    volumes:
    - ./scripts:/scripts:ro
    - $HOME/external:/deploy/external:rw
