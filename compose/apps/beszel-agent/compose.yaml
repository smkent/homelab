services:
  beszel-agent:
    image: henrygd/beszel-agent:latest
    env_file:
    - host.env
    - beszel-agent.env
    - ../../secrets/beszel-agent.env
    restart: unless-stopped
    network_mode: host
    volumes:
    - ../../volumes/${COMPOSE_PROJECT_NAME}/beszel_agent_data:/var/lib/beszel-agent
    - ../../volumes/${COMPOSE_PROJECT_NAME}/beszel_socket:/beszel_socket
    - ${DATA_MOUNT:-/dev/null}:/extra-filesystems/md127__data:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
